<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" type="image/png" href="/note/img/note_logo.png">
  <style>
    /* 基礎手機自適應排版 */
    body { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; line-height: 1.6; color: #333; }
    img { max-width: 100%; height: auto; border-radius: 8px; }
    
    /* 頂部 Logo 區塊設定 */
    .site-header { display: flex; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 25px; }
    .site-logo { width: 50px; height: 50px; margin-right: 15px; object-fit: contain; }
    .site-title { font-size: 1.5em; font-weight: bold; text-decoration: none; color: #2c7a7b; }
    
    /* 標籤樣式 */
    .tag { background: #e2e8f0; padding: 3px 8px; border-radius: 12px; font-size: 0.85em; margin-right: 5px; color: #4a5568;}
    
    /* 頁尾區塊設定 */
    .site-footer { 
      margin-top: 50px; 
      padding-top: 20px; 
      border-top: 1px solid #edf2f7; /* 分隔線顏色調淡 */
      text-align: center; 
      font-size: 0.75em; /* 👈 關鍵：設定為 0.75em，比標籤小 */
      color: #a0aec0; /* 👈 字體顏色調成低調的淺灰 */
      line-height: 1.8;
    }
    .site-footer a {
      color: #a0aec0; /* 讓版權宣告的超連結也變成淺灰色 */
      text-decoration: none;
      transition: color 0.2s;
    }
    .site-footer a:hover {
      color: #718096; /* 滑鼠游標移過去時稍微變深一點點 */
    }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-T5R33JYTC0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-T5R33JYTC0');
</script>
</head>
<body>

  <header class="site-header">
    <a href="{{ '/' | relative_url }}"><img src="/note/img/note_logo.png" alt="Logo" class="site-logo"></a>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  </header>

  <main>
    {% if page.date %}
    <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; margin-bottom: 25px;">
      <h1 style="margin: 0; color: #333333; font-size: 2em;">{{ page.title }}</h1>
      <span style="color: #718096; font-size: 1.1em; font-weight: normal;">
        資料生成日期：{{ page.date | date: "%Y-%m-%d" }}
      </span>
    </div>
    {% endif %}
    {{ content }}
    {% if page.tags %}
<hr style="margin-top: 50px;">
<div style="margin-top: 20px;">
  <span style="font-weight: bold; color: #4a5568;">本文標籤：</span>
  {% for tag in page.tags %}
    <a href="{{ '/tags/' | relative_url }}#{{ tag }}" style="display: inline-block; background: #edf2f7; color: #4a5568; padding: 2px 10px; border-radius: 4px; text-decoration: none; font-size: 0.9em; margin-right: 5px;">
      #{{ tag }}
    </a>
  {% endfor %}
</div>
{% endif %}
  </main>
<footer class="site-footer">
  <p><small>本站內容僅供專業人士自修參考，不保證內容更新與正確性，請自行查核。</small></p>
  <p>
    <a href="https://liaoweihung.github.io/hub/index.html">&copy; 2026 💎 DiamondL 藥師開發設計</a> 
    &nbsp;|&nbsp; 
    <a href="https://liaoweihung.github.io/hub/feedback.html?source=藥師自我學習資料分享" target="_blank" onclick="gtag('event', 'click_feedback', { 'source_app': 'note' });">💬 意見回饋</a>
  </p>
</footer>


  
<script>
    document.addEventListener("DOMContentLoaded", function() {
      // 自動尋找網頁中所有包含 "drive.google.com" 的超連結
      var driveLinks = document.querySelectorAll('a[href*="drive.google.com"]');
      
      driveLinks.forEach(function(link) {
        link.addEventListener('click', function() {
          // 當有人點擊時，發送自訂事件給 GA4
          gtag('event', 'drive_download_click', {
            'link_url': link.href,         // 紀錄點擊的雲端硬碟網址
            'link_text': link.innerText,   // 紀錄按鈕或連結上的文字 (例如: 下載投影片)
            'page_title': document.title   // 紀錄這是在哪一篇文章被點擊的
          });
        });
      });
    });
  </script>
</body>
</html>
